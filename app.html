<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordle Clone</title>

  <style> 

    /* ── Page basics ── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .top-bar {
      width: 100%;
      background-color: #333;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .top-bar h1 {
      font-size: 1.4rem;
      letter-spacing: 3px;
      color: #6aaa64;
    }

    .top-bar a {
      color: #ccc;
      font-size: 0.88rem;
      text-decoration: none;
    }

    .top-bar a:hover {
      color: #6aaa64;
    }

    /* ── Instructions ── */
    .instructions {
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 12px 20px;
      margin: 16px;
      max-width: 440px;
      width: 100%;
      font-size: 0.88rem;
      color: #555;
      text-align: center;
      line-height: 1.6;
    }

    /* ── Tile grid ── */
    #board {
      display: grid;
      grid-template-rows: repeat(6, 62px);
      grid-template-columns: repeat(5, 62px);
      gap: 6px;
      margin: 10px auto;
    }

    .tile {
      width: 62px;
      height: 62px;
      border: 2px solid #cccccc;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: bold;
      font-family: Arial, sans-serif;
      text-transform: uppercase;
      transition: border-color 0.1s;
      background-color: white;
      color: #333;
    }

    /* When a tile has a letter typed into it */
    .tile.filled {
      border-color: #888888;
    }

    /* After a row is submitted — correct letter, correct position */
    .tile.correct {
      background-color: #6aaa64;
      border-color: #6aaa64;
      color: white;
    }

    /* After a row is submitted — correct letter, wrong position */
    .tile.present {
      background-color: #c9b458;
      border-color: #c9b458;
      color: white;
    }

    /* After a row is submitted — letter not in word */
    .tile.absent {
      background-color: #787c7e;
      border-color: #787c7e;
      color: white;
    }

    /* Pop animation when you type a letter */
    .tile.pop {
      animation: pop 0.1s ease;
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    /* Shake animation when guess is wrong/invalid */
    .shake {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-5px); }
      40%       { transform: translateX(5px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }

    /* ── Message box ── */
    #message {
      height: 32px;
      font-size: 0.95rem;
      font-weight: bold;
      color: #c0392b;
      text-align: center;
      margin: 6px 0;
      min-width: 340px;
    }

    /* ── Keyboard ── */
    #keyboard {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      margin: 12px 0 30px;
    }

    .key-row {
      display: flex;
      gap: 6px;
    }

    .key {
      height: 56px;
      min-width: 40px;
      padding: 0 8px;
      border: none;
      border-radius: 4px;
      background-color: #d3d6da;
      color: #333;
      font-size: 0.85rem;
      font-weight: bold;
      font-family: Arial, sans-serif;
      cursor: pointer;
      text-transform: uppercase;
      transition: background-color 0.2s;
    }

    .key:hover {
      opacity: 0.85;
    }

    /* Wide keys for Enter and Backspace */
    .key.wide {
      min-width: 64px;
      font-size: 0.78rem;
    }

    /* Keyboard key colors after guesses */
    .key.correct {
      background-color: #6aaa64;
      color: white;
    }

    .key.present {
      background-color: #c9b458;
      color: white;
    }

    .key.absent {
      background-color: #787c7e;
      color: white;
    }

    /* ── New game button ── */
    #newGameBtn {
      display: none;    /* hidden until game is over */
      margin: 10px auto 20px;
      padding: 12px 28px;
      background-color: #6aaa64;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }

    #newGameBtn:hover {
      background-color: #5a9a54;
    }

    /* ── Back link ── */
    .back-link {
      font-size: 0.85rem;
      color: #0d6efd;
      text-decoration: none;
      margin-bottom: 20px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <h1>WORDLE</h1>
    <a href="scratch.html">← Back to Word Games Page</a>
  </div>


  <!-- INSTRUCTIONS -->
  <div class="instructions">
    Guess the 5-letter word in <strong>6 tries</strong>.<br />
    🟩 Green = right letter, right spot &nbsp;|&nbsp;
    🟨 Yellow = right letter, wrong spot &nbsp;|&nbsp;
    ⬜ Gray = letter not in word
  </div>

  <div id="board"></div>


  <!-- MESSAGE (shows errors or win/loss messages) -->
  <div id="message"></div>


  <!-- NEW GAME BUTTON (shown after game ends) -->
  <button id="newGameBtn" onclick="startNewGame()">🔄 New Game</button>

    <div class="key-row" id="row1"></div>
    <div class="key-row" id="row2"></div>
    <div class="key-row" id="row3"></div>

    // ── Keyboard layout ──────────────────────────
    const ROWS = [
      ["q","w","e","r","t","y","u","i","o","p"],
      ["a","s","d","f","g","h","j","k","l"],
      ["Enter","z","x","c","v","b","n","m","⌫"]
    ];

    // ── Game state variables ──────────────────────
    let targetWord   = "";
    let currentRow   = 0;
    let currentCol   = 0;
    let currentGuess = [];
    let gameOver     = false;

    // Tracks keyboard colors: letter → "correct" / "present" / "absent"
    const keyColors = {};


    // ── Build the 6×5 tile grid ───────────────────
    function buildBoard() {
      const board = document.getElementById("board");
      board.innerHTML = "";
      for (let r = 0; r < 6; r++) {
        for (let c = 0; c < 5; c++) {
          const tile = document.createElement("div");
          tile.classList.add("tile");
          tile.id = `tile-${r}-${c}`;
          board.appendChild(tile);
        }
      }
    }


    // ── Build the on-screen keyboard ──────────────
    function buildKeyboard() {
      ROWS.forEach((letters, i) => {
        const row = document.getElementById(`row${i + 1}`);
        row.innerHTML = "";
        letters.forEach(letter => {
          const btn = document.createElement("button");
          btn.classList.add("key");
          btn.textContent = letter;
          btn.id = "key-" + letter;
          if (letter === "Enter" || letter === "⌫") btn.classList.add("wide");
          btn.addEventListener("click", () => handleKey(letter));
          row.appendChild(btn);
        });
      });
    }


    // ── Pick a random word from the list ─────────
    function pickWord() {
      const i = Math.floor(Math.random() * WORDS.length);
      return WORDS[i];
    }


    // ── Show a message to the player ─────────────
    function showMessage(msg, color = "#c0392b") {
      const el = document.getElementById("message");
      el.textContent = msg;
      el.style.color = color;
    }


    // ── Handle a key press (letter, Enter, or ⌫) ─
    function handleKey(key) {
      if (gameOver) return;

      if (key === "⌫" || key === "Backspace") {
        // Delete last letter
        if (currentCol > 0) {
          currentCol--;
          currentGuess.pop();
          const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
          tile.textContent = "";
          tile.classList.remove("filled");
        }
        return;
      }

      if (key === "Enter") {
        submitGuess();
        return;
      }

      // Regular letter
      if (currentCol < 5 && /^[a-zA-Z]$/.test(key)) {
        const letter = key.toLowerCase();
        currentGuess.push(letter);
        const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
        tile.textContent = letter.toUpperCase();
        tile.classList.add("filled");
        tile.classList.add("pop");
        setTimeout(() => tile.classList.remove("pop"), 150);
        currentCol++;
        showMessage(""); // clear any error
      }
    }


    // ── Submit the current guess row ─────────────
    function submitGuess() {
      if (currentCol < 5) {
        showMessage("Not enough letters!");
        shakeRow(currentRow);
        return;
      }

      const guess = currentGuess.join("");

      // Check if it's a real word (must be in the word list)
      if (!WORDS.includes(guess)) {
        showMessage("Not in word list!");
        shakeRow(currentRow);
        return;
      }

      // Color the tiles
      const result = getColors(guess, targetWord);
      colorRow(currentRow, guess, result);

      // Update keyboard colors
      for (let i = 0; i < 5; i++) {
        const letter = guess[i];
        const color  = result[i];
        // Only upgrade: absent < present < correct
        if (!keyColors[letter] || shouldUpgrade(keyColors[letter], color)) {
          keyColors[letter] = color;
        }
        const keyEl = document.getElementById("key-" + letter);
        if (keyEl) {
          keyEl.className = "key " + keyColors[letter];
        }
      }

      // Check win
      if (guess === targetWord) {
        const msgs = ["Genius!", "Magnificent!", "Impressive!", "Splendid!", "Great!", "Phew!"];
        showMessage(msgs[currentRow] || "Nice!", "#27ae60");
        gameOver = true;
        document.getElementById("newGameBtn").style.display = "block";
        return;
      }

      // Move to next row
      currentRow++;
      currentCol   = 0;
      currentGuess = [];

      // Check loss
      if (currentRow === 6) {
        showMessage("The word was: " + targetWord.toUpperCase());
        gameOver = true;
        document.getElementById("newGameBtn").style.display = "block";
      }
    }


    // ── Figure out green / yellow / gray for each letter ──
    function getColors(guess, target) {
      const result   = Array(5).fill("absent");
      const tLetters = target.split("");  // copy so we can mark used letters
      const gLetters = guess.split("");

      // Pass 1: find greens
      for (let i = 0; i < 5; i++) {
        if (gLetters[i] === tLetters[i]) {
          result[i]   = "correct";
          tLetters[i] = null;   // mark used
          gLetters[i] = null;   // mark used
        }
      }

      // Pass 2: find yellows
      for (let i = 0; i < 5; i++) {
        if (gLetters[i] === null) continue;
        const idx = tLetters.indexOf(gLetters[i]);
        if (idx !== -1) {
          result[i]    = "present";
          tLetters[idx] = null;  // mark used
        }
      }

      return result;
    }


    // ── Paint a row with colors ───────────────────
    function colorRow(row, guess, result) {
      for (let c = 0; c < 5; c++) {
        const tile = document.getElementById(`tile-${row}-${c}`);
        // Small delay so tiles flip one at a time (nicer effect)
        setTimeout(() => {
          tile.classList.add(result[c]);
        }, c * 80);
      }
    }


    // ── Shake a row to signal a bad guess ────────
    function shakeRow(row) {
      for (let c = 0; c < 5; c++) {
        const tile = document.getElementById(`tile-${row}-${c}`);
        tile.classList.add("shake");
        setTimeout(() => tile.classList.remove("shake"), 500);
      }
    }


    // ── Determine if a color is an upgrade ───────
    function shouldUpgrade(current, newColor) {
      const rank = { absent: 0, present: 1, correct: 2 };
      return rank[newColor] > rank[current];
    }


    // ── Start a new game ─────────────────────────
    function startNewGame() {
      targetWord   = pickWord();
      currentRow   = 0;
      currentCol   = 0;
      currentGuess = [];
      gameOver     = false;

      // Clear keyboard colors
      for (const letter in keyColors) delete keyColors[letter];

      buildBoard();
      buildKeyboard();
      showMessage("");
      document.getElementById("newGameBtn").style.display = "none";
    }


    // ── Listen for physical keyboard presses ─────
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === "Backspace") {
        handleKey(e.key);
      } else if (/^[a-zA-Z]$/.test(e.key)) {
        handleKey(e.key);
      }
    });


    // ── Start the game on page load ───────────────
    startNewGame();

  </script>
